      **Countries Included:** Austria, Belgium, Bulgaria, Croatia, Czechia, Denmark, Estonia, Finland, France, Germany, Greece, Hungary, Ireland, Italy, Latvia, Lithuania, Luxembourg, Montenegro, Netherlands, North Macedonia, Norway, Poland, Portugal, Romania, Serbia, Slovakia, Slovenia, Spain, Sweden, Switzerland, United Kingdom

      **Columns:**
      - Country: Country name
      - ISO3 Code: Three-letter country code
      - Datetime (UTC): Timestamp in UTC
      - Datetime (Local): Timestamp in local time
      - Price (EUR/MWhe): Hourly wholesale electricity price
      - Year: Year extracted from datetime
      - Month: Month (1-12)
      - Day: Day (1-31)
      - Hour: Hour (0-23)

      **Statistics:**
      - Total Records: 2.8M+ rows
      - Date Range: 2015 to present
      - 31 countries covered

