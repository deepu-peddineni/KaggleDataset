# Upload Settings
upload:
  # Create dataset if it doesn't exist (first time only)
  create_if_missing: true

  # Make dataset public
  is_public: true

  # Quiet mode (less verbose output)
  quiet: false

# Instructions for adding new datasets:
# 1. Create a new entry under 'datasets:'
# 2. Set 'enabled: true'
# 3. Specify source directory and Kaggle dataset slug
# 4. Add descriptive metadata (title, description, keywords)
# 5. List files to upload (relative paths from project root)
# 6. The CI/CD workflow will automatically handle the upload

# Example new dataset format:
# my_new_dataset:
#   enabled: false  # Set to true to activate
#   source_dir: "MyDataset"
#   kaggle_dataset: "your-username/my-dataset-slug"
#   kaggle_slug: "my-dataset-slug"
#   title: "My Dataset Title"
#   description: "Detailed description here"
#   keywords: ["keyword1", "keyword2"]
#   category: "Category"
#   license: "CC0"
#   files:
#     - "MyDataset/csv/data.csv"
#     - "MyDataset/parquet/data.parquet"
