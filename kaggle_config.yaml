  european_electricity_interconnection:
    enabled: true
    source_dir: "EuropeanElectricty"
    pre_upload:
      script: "EuropeanElectricty/european_interconnection.py"
      allow_fail: false
    kaggle_dataset: "lakshmi2305/european-electricity-interconnection"
    kaggle_slug: "european-electricity-interconnection"
    title: "European Electricity Interconnection Data"
    subtitle: "Cross-border interconnection capacity, flows, and indicators for Europe"
    description: |
      Comprehensive European electricity interconnection data from Ember Energy, covering interconnector capacity (NTC), cross-border flows, import potential, country-level RES penetration, and peak demand projections.

      **Data Source:** Ember Energy — Europe Electricity Interconnection Data Tool
      **Reference:** https://ember-energy.org/

      **Datasets Included:**
      - **peak_demand**: Peak demand (MW) per country for 2024, 2030, 2040
      - **interconnectors**: Net Transfer Capacity (NTC) per border for Reference, Projects, and Needs scenarios
      - **import_potential**: Import potential (%) by country for 2024, Reference, Projects, and Needs scenarios
      - **country_indicators**: Hourly and monthly averages of Net Position and Variable RES Penetration (%)
      - **flow_indicators**: Hourly and monthly cross-border flow indicators (%)

      **Scenarios:**
      - Reference: 2024 baseline capacity
      - Projects: Planned interconnection projects
      - Needs: Required capacity to meet targets

      **Time Horizons:** 2024, 2030, 2040

      **Key Columns:**
      - Country / Border: Geographic identifiers
      - Year: Target year (2024, 2030, 2040)
      - Category: Data type (peak_demand, interconnector, import_potential, country_indicator, flow_indicator)
      - NTC_F / NTC_B: Forward and backward Net Transfer Capacity (MW)
      - RES-E: Variable Renewable Energy penetration (%)
      - NET-P: Net position indicator (%)
      - Flow: Cross-border flow indicator

      Last Updated: Static dataset
    keywords: ["electricity", "interconnection", "europe", "ntc", "cross-border", "energy-grid", "renewable-energy", "ember-energy"]
    category: "Energy"
    license: "CC0-1.0"
    image: "EuropeanElectricty/assets/interconnection.png"
    file_info:
